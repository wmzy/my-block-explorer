<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script type="text/javascript">
      (function () {
        var l = window.location;
        if (l.pathname.indexOf('/index.html') !== -1) return;
        var base = '/my-block-explorer/';
        var rawPath = l.pathname;
        if (rawPath.indexOf(base) === 0) {
          rawPath = rawPath.substring(base.length);
        }
        if (rawPath.charAt(0) === '/') rawPath = rawPath.substring(1);
        if (!rawPath || rawPath === 'index.html') {
          l.replace(l.protocol + '//' + l.host + base + 'index.html');
        } else {
          var existingHash = l.hash ? l.hash.substring(1) : '';
          var route = existingHash || rawPath;
          l.replace(l.protocol + '//' + l.host + base + 'index.html#/' + route + (l.search || ''));
        }
      })();
    </script>
  </head>
  <body></body>
</html>
